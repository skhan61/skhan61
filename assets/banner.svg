<svg xmlns="http://www.w3.org/2000/svg" width="820" height="200" viewBox="0 0 820 200" fill="none" role="img" aria-label="Sayem Khan — Agentic AI Engineer and ML Researcher">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#131a26"/>
    </linearGradient>
    <linearGradient id="nameGrad" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="280" y2="0" spreadMethod="repeat">
      <stop offset="0%"  stop-color="#6366f1"/>
      <stop offset="35%" stop-color="#22d3ee"/>
      <stop offset="70%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#6366f1"/>
      <animateTransform attributeName="gradientTransform" type="translate"
        from="-280 0" to="280 0" dur="5s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="820" height="200" rx="16" fill="url(#bgGrad)"/>

  <text x="40" y="95" font-family="ui-sans-serif, system-ui, 'Segoe UI', sans-serif"
        font-size="64" font-weight="800" fill="url(#nameGrad)" letter-spacing="1">Sayem Khan</text>

  <path d="M 42 116 L 470 116" stroke="url(#lineGrad)" stroke-width="4" stroke-linecap="round"
        stroke-dasharray="430" stroke-dashoffset="430">
    <animate attributeName="stroke-dashoffset" from="430" to="0" dur="1.4s"
      begin="0.2s" fill="freeze" calcMode="spline" keySplines="0.16 1 0.3 1" keyTimes="0;1" values="430;0"/>
  </path>

  <text x="44" y="152" font-family="ui-monospace, 'SFMono-Regular', monospace"
        font-size="22" font-weight="500" fill="#9fb0cc" opacity="0">
    Agentic AI Engineer · ML Researcher · builder of multi-agent systems
    <animate attributeName="opacity" from="0" to="1" dur="0.9s" begin="1.1s" fill="freeze"/>
  </text>

  <g fill="#22d3ee">
    <circle cx="700" cy="50" r="5" opacity="0.85">
      <animate attributeName="cy" values="50;38;50" dur="4s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" keyTimes="0;0.5;1"/>
    </circle>
    <circle cx="745" cy="80" r="4" fill="#a78bfa" opacity="0.85">
      <animate attributeName="cy" values="80;66;80" dur="5s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" keyTimes="0;0.5;1"/>
    </circle>
    <circle cx="765" cy="45" r="3" fill="#6366f1" opacity="0.85">
      <animate attributeName="cy" values="45;33;45" dur="3.4s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" keyTimes="0;0.5;1"/>
    </circle>
  </g>
  <g stroke="#6366f1" stroke-width="1" opacity="0.4">
    <line x1="700" y1="50" x2="745" y2="80"/>
    <line x1="745" y1="80" x2="765" y2="45"/>
    <line x1="765" y1="45" x2="700" y2="50"/>
  </g>
</svg>
